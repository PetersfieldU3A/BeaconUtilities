; ============================================================
; BeaconUtilities configuration file
; Copy this file to config/config.ini and edit the values
; below to match your setup.  Never commit config.ini to
; version control — it may contain sensitive credentials.
; ============================================================

[beacon]
; URL for the Beacon CRM portal login page.
portal_url = https://u3abeacon.org.uk/password.php
; The name of your U3A as it appears in the Beacon site selector dropdown.
site_name = Petersfield
; Your Beacon login username.
username =
; Your Beacon login password.
password =

[beacon_export]
; Exact link text for the Members Excel export under "Data export & backup".
; Confirmed value from playwright-record session (2026-04-27).
members_link_name = Members and addresses
; Exact link text for the Groups Excel export under "Data export & backup".
; Confirmed from playwright-record session 2026-04-27
groups_link_name = Groups, with members, venues
; Local directory where downloaded Excel files are saved (relative to project root).
download_dir = downloads

[database]
; Optional local staging database for extracted records.
; Useful when reprocessing Members/Groups in different ways.
enabled = false
path = state/beacon_data.db
; false (default): each sync replaces staged rows (session-style behavior)
; true: rows accumulate across sync runs until manually cleared
persist_across_sessions = false

[wordpress]
; Base URL of the WordPress site (no trailing slash).
site_url = https://petersfield.u3asite.uk
; WordPress username for REST API authentication.
username =
; WordPress application password (generated in WP Admin > Users > Profile).
application_password =
; WordPress post type for member records (e.g. post, page, or a custom type like 'member').
members_post_type = post
; WordPress post type for group records.
groups_post_type = post
